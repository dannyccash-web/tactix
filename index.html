<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Mobile-friendly viewport (prevents unexpected zoom + supports safe areas on iOS). -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Tactix</title>

    <!-- Font (external). If blocked, the game still runs with fallbacks. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geo&display=swap" rel="stylesheet" />

    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0b0f14;
        overflow: hidden;
        font-family: "Geo", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }
      #game { width: 100%; height: 100%; }
      canvas { display: block; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
