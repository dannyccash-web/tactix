<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tactix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geo&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0b0f14;
      overflow: hidden;
      font-family: "Geo", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    body {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }
    #boot-status {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #d7e7ff;
      background: #0b0f14;
      letter-spacing: 0.06em;
      z-index: 1;
      text-align: center;
      padding: 24px;
    }
    #boot-status.hidden { display: none; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="boot-status">LOADING TACTIX…</div>
  <script>
    (function(){
      const boot = document.getElementById('boot-status');
      const phaserCdns = [
        'https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js',
        'https://unpkg.com/phaser@3.80.1/dist/phaser.min.js'
      ];
      const mainCandidates = ['./main.js', './tactix/main.js'];

      function setStatus(msg){ if (boot) boot.textContent = msg; }
      function hideStatus(){ if (boot) boot.classList.add('hidden'); }
      function loadScript(src){
        return new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = src;
          s.async = false;
          s.onload = () => resolve(src);
          s.onerror = () => reject(new Error('Failed to load ' + src));
          document.head.appendChild(s);
        });
      }
      async function loadFirst(list, label){
        let lastErr = null;
        for (const src of list){
          try {
            setStatus('LOADING ' + label + '…');
            await loadScript(src);
            return src;
          } catch (err) {
            lastErr = err;
          }
        }
        throw lastErr || new Error('Unable to load ' + label);
      }
      async function detectAssetBase(){
        const candidates = ['./', './tactix/'];
        for (const base of candidates){
          try {
            const res = await fetch(base + 'tactix-logo.png', { cache: 'no-store' });
            if (res.ok) return base;
          } catch (err) {}
        }
        return './';
      }
      window.addEventListener('error', function(ev){
        if (!boot) return;
        const msg = (ev && ev.message) ? ev.message : 'Unknown startup error';
        boot.classList.remove('hidden');
        boot.textContent = 'TACTIX COULD NOT START: ' + msg;
      });
      (async function(){
        try {
          window.__TACTIX_BASE__ = await detectAssetBase();
          await loadFirst(phaserCdns, 'PHASER');
          await loadFirst(mainCandidates, 'GAME FILES');
          hideStatus();
        } catch (err) {
          console.error(err);
          setStatus('TACTIX COULD NOT START. PLEASE RE-UPLOAD THE UPDATED GAME FILES TO GITHUB.');
        }
      })();
    })();
  </script>
</body>
</html>
